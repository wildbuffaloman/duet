<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>duet — a tiling agent terminal</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='0' y='2' width='7' height='12' rx='1.5' fill='%233fd3bf'/%3E%3Crect x='9' y='2' width='7' height='12' rx='1.5' fill='%23a78bfa'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/vendor/xterm.css">
  <link rel="stylesheet" href="/app.css">
</head>
<body>

<div class="app">
  <div class="toolbar">
    <span class="focus-info" id="focusInfo">focused: <b>—</b></span>
    <button class="tbtn" id="newSessBtn" title="Create a new session with its own color">＋ session</button>
    <button class="tbtn" id="resetBtn" title="Forget the saved layout and start over">reset layout</button>
    <span class="hint">split ⊞/⊟ · hover the seam to flip ⇄/⇅ · drag the seam to resize · click ▌/◪ to switch a pane · drag the grip to swap</span>
    <span class="spacer"></span>
    <div class="tray" id="tray"><span class="thead">hidden:</span><span class="hint" id="trayEmpty">none</span></div>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle theme" title="Toggle light / dark">◐</button>
  </div>

  <main class="workspace" id="workspace"></main>
</div>

<div class="toast" id="toast"></div>

<script src="/vendor/xterm.js"></script>
<script src="/vendor/addon-fit.js"></script>
<script src="/vendor/addon-webgl.js"></script>
<script src="/shell-escape.js"></script>
<script src="/app.js"></script>
</body>
</html>
